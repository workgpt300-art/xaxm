version: '3.8'

services:
  # База даних PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: earning_platform_db
    restart: always
    environment:
      # Налаштування доступу (збігаються з .env)
      POSTGRES_USER: user_admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: earning_db
    ports:
      - "5432:5432"
    volumes:
      # Зберігаємо дані бази у папці на диску, щоб вони не зникли після перезавантаження
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
