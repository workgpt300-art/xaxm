<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Earn Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* Твої стилі */
      body {
        margin: 0;
        padding: 0;
        background-color: black;
        color: white;
        overflow: hidden;
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
        touch-action: manipulation;
      }

      #root {
        height: 100vh;
        width: 100vw;
      }

      input, textarea {
        user-select: text !important;
        -webkit-user-select: text !important;
        touch-action: auto !important;
      }

      @keyframes float-up {
        0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        30% { opacity: 1; transform: translate(-50%, -180%) scale(1.3); }
        100% { opacity: 0; transform: translate(-50%, -350%) scale(0.7); }
      }

      .animate-float-up {
        animation: float-up 0.8s ease-out forwards;
        pointer-events: none;
        position: absolute;
        z-index: 100;
        font-weight: 900;
        filter: drop-shadow(0 0 8px rgba(74, 222, 128, 0.6));
      }

      .transition-all {
        transition: all 0.3s ease-out;
      }
    </style>
  </head>
  <body>
    <!-- 1. Контейнер, куди React малює гру -->
    <div id="root"></div>

    <!-- 2. Команда запустити твій JavaScript -->
    <!-- ВАЖЛИВО: перевір, щоб шлях до main.jsx був правильним -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
