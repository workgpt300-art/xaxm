<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Earn Platform</title>
    <!-- Підключаємо дорогий сучасний шрифт Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #050505; /* Глибокий чорний */
        color: white;
        overflow: hidden;
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
        touch-action: manipulation;
        font-family: 'Outfit', sans-serif;
        -webkit-font-smoothing: antialiased;
      }

      #root {
        height: 100vh;
        width: 100vw;
      }

      input, textarea {
        user-select: text !important;
        -webkit-user-select: text !important;
        touch-action: auto !important;
      }

      @keyframes float-up {
        0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        30% { opacity: 1; transform: translate(-50%, -180%) scale(1.3); }
        100% { opacity: 0; transform: translate(-50%, -350%) scale(0.7); }
      }

      .animate-float-up {
        animation: float-up 0.8s ease-out forwards;
        pointer-events: none;
        position: absolute;
        z-index: 100;
        font-weight: 900;
        filter: drop-shadow(0 0 10px rgba(74, 222, 128, 0.8));
      }

      /* Сховати скроллбар для краси */
      ::-webkit-scrollbar { display: none; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
