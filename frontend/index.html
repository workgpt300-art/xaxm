<style>
      /* Основні системні налаштування */
      body {
        margin: 0;
        padding: 0;
        background-color: black;
        color: white;
        overflow: hidden;
        
        /* Глобальне вимкнення виділення та підсвічування */
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        -khtml-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        user-select: none;
        
        /* Запобігає зуму та затримці кліку */
        touch-action: manipulation;
      }

      #root {
        height: 100vh;
      }

      /* Дозволяємо виділення тексту тільки в інпутах (логін/пароль) */
      input, textarea {
        user-select: text !important;
        -webkit-user-select: text !important;
        touch-action: auto !important;
      }

      /* АНІМАЦІЯ ВИЛІТАЮЧИХ ЦИФР */
      @keyframes float-up {
        0% {
          opacity: 1;
          transform: translate(-50%, -50%) scale(1);
        }
        30% {
          opacity: 1;
          transform: translate(-50%, -180%) scale(1.3);
        }
        100% {
          opacity: 0;
          transform: translate(-50%, -350%) scale(0.7);
        }
      }

      .animate-float-up {
        animation: float-up 0.8s ease-out forwards;
        pointer-events: none;
        position: absolute;
        z-index: 100;
        font-weight: 900;
        filter: drop-shadow(0 0 8px rgba(74, 222, 128, 0.6));
      }

      .transition-all {
        transition: all 0.3s ease-out;
      }
    </style>
